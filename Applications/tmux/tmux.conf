# === Options ===

# Mouse mode:
# 1. scrolling will scroll the pane buffer (rather than scroll through command history)
# 2. click to select panes/windows
# 3. drag to resize
set -g mouse on
# Auto-renumber windows (close window 2 of 1 2 3 → remaining become 1 2 instead of 1 3)
set -g renumber-windows on
# Session survival: kill the current session and you get dropped into another (the most
# recently used) remaining session instead of being kicked out of tmux and into the bare shell.
# You only get detached if there are no sessions left at all.
set -g detach-on-destroy off
# Increase scrollback buffer size from 2000 to 50000 lines per pane
set -g history-limit 50000
# Increase tmux status messages display duration from 750ms to 3s
set -g display-time 3000
# Refresh the status bar ('status-left' and 'status-right') more often: from every 15s to every 3s
set -g status-interval 3
# Display the status bar at the top of the screen instead of the bottom
set -g status-position top
# Focus events: lets apps like nvim know when their pane gains/loses focus
set -g focus-events on
# How a window's size is decided when the same window is visible to multiple clients of
# different sizes (multi-client situations):
# Default (off): a window is sized to the smallest session that contains it. If *any* client attached
# to *any* session that includes this window is small, the window shrinks to fit that smallest one — even
# if the client you're actually looking at right now is huge.
# (on): a window is sized to the smallest client that is actively looking at that specific window right
# now — not every session it belongs to. So a window only gets constrained by clients genuinely displaying it.
# Useful when using 'grouped sessions' (sessions that share windows but let you navigate independently) and
# multi-monitor setups.
setw -g aggressive-resize on
# How long (in milliseconds) tmux waits after receiving an Escape byte (0x1b) before deciding what that Escape
# actually was (default is 500ms, adding a delay in e.g. vim when leaving insert mode).
# nvim's :checkhealth flags anything above 10.
set -s escape-time 10
# Truecolor: use tmux-256color inside tmux and tell tmux the outer terminal supports RGB so colours
# render correctly (modern terminals like Ghostty or WezTerm all do; $TERM here is xterm-ghostty).
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:RGB"

# === Keybindings ===

# Vim-style navigation in copy mode (enter with prefix + [, exit with q)
setw -g mode-keys vi
# Set v to start selection, y to yank.
# And with set-clipboard on, copy-selection-and-cancel makes tmux write the system clipboard via
# OSC 52 — cross-platform and works over SSH, as long as the terminal supports it (e.g. Ghostty)
set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Smoother scrolling in copy mode: 1 line per notch instead of 5 (default).
# Only the vi table is needed since mode-keys is set to vi (above).
bind-key -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send -N1 -X scroll-down

# Don't ask for confirmation when closing windows and panes (kept default keys)
bind-key & kill-window
bind-key x kill-pane

# prefix + t: tmux-sessionizer, instead of the default (show time)
# bind-key t display-popup -w 80% -E 'tmux-sessionizer' # TODO: reconsider this (3rd party script + a change of default binding)

# === Plugins ===

# Plugins are installed and pinned by Nix which symlinks each into $XDG_CONFIG_HOME/tmux/plugins/.
# No TPM needed: update plugins by bumping nixpkgs (nix flake update) and rebuilding.

# Hand-written status line:
# Catppuccin is loaded for its palette (@thm_*) and global theming (copy-mode highlight, messages,
# pane borders, popups). We DON'T use its fiddly status-module system (@catppuccin_status_*).
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"   # transparent bar
run "$XDG_CONFIG_HOME/tmux/plugins/catppuccin/catppuccin.tmux"

set -g status-left ""
set -g status-left-length 100
set -g status-right-length 100

# Window tabs: Catppuccin's "slanted" style rebuilt by hand because Catppuccin's own slanted
# style reverses against the bar bg, so it can't be transparent.
set -g window-status-separator ""
set -g window-status-format "#[fg=#{@thm_overlay_2},bg=default]#[fg=#{@thm_crust},bg=#{@thm_overlay_2}] #I #[fg=#{@thm_overlay_2},bg=#{@thm_surface_0}]#[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{pane_current_command} #[fg=#{@thm_surface_0},bg=default]"
set -g window-status-current-format "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_crust},bg=#{@thm_mauve}] #I #[fg=#{@thm_mauve},bg=#{@thm_surface_1}]#[fg=#{@thm_fg},bg=#{@thm_surface_1}] #{pane_current_command} #[fg=#{@thm_surface_1},bg=default]"

# Session pill (right): rounded caps, dark text, uniform green that flips red while the prefix is held.
set -g status-right "#[fg=#{?client_prefix,#{@thm_red},#{@thm_green}},bg=default]#[fg=#{@thm_crust},bg=#{?client_prefix,#{@thm_red},#{@thm_green}}]  #S #[fg=#{?client_prefix,#{@thm_red},#{@thm_green}},bg=default]"

# tmux-resurrect: prefix + Ctrl-s to save, prefix + Ctrl-r to restore.
# tmux environments are saved to a file in ~/.local/share/tmux/resurrect
set -g @resurrect-capture-pane-contents 'on' # restore pane contents
# set -g @resurrect-strategy-nvim 'session' # restore neovim sessions
# tmux-resurrect will now restore neovim sessions if Session.vim file is present.
run "$XDG_CONFIG_HOME/tmux/plugins/resurrect/resurrect.tmux"

# tmux-continuum: periodic auto-save every 15 min; manual restore (prefix + Ctrl-r).
# Options must be set before it runs, and continuum must load AFTER resurrect.
set -g @continuum-save-interval '15'
set -g @continuum-restore 'off'
run "$XDG_CONFIG_HOME/tmux/plugins/continuum/continuum.tmux"
