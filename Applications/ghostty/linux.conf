# Linux/GTK-only Ghostty settings, optionally included from the shared `config`.

# Tabs across the top inside the integrated GTK titlebar.
# The Linux analogue of `macos-titlebar-style = tabs`.
gtk-titlebar = true
gtk-titlebar-style = tabs

# Force client-side decorations so Ghostty only draws its own header bar (with
# tabs in it). Otherwise, KWin/KDE also adds its own server-side titlebar on top.
window-decoration = client

maximize = true

