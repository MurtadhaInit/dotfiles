"$schema" = "https://starship.rs/config-schema.json"  # editor autocomplete
# NOTE: Unlike the Warp config, the right_format module was not used to
# produce the right prompt. This is because that module places elements
# on the same line as the input location. So fill is used instead.
# This has been avoided by Warp's default behaviour of creating a new line.

# === Prompt-wide configurations ===
palette = "catppuccin_mocha"
command_timeout = 1500  # Default timeout for commands is 500ms
add_newline = true  # A blank line before prompt start

format = """
$username\
$sudo\
$hostname\
$localip\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$all$cmd_duration\
$line_break\
$character
"""

# === Misc. ===
[fill]
symbol = " "

[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_replace_one_symbol = "[ÔØ«](bold purple)"
vimcmd_replace_symbol = "[ÔØ«](bold purple)"
vimcmd_visual_symbol = "[ÔØ«](bold yellow)"

# === 1st Line: left hand side ===
[username]
format = "[´Éò $user]($style) "

[sudo]
disabled = false
style = "bold rosewater"
# symbol = '\[sudo\] '
symbol = "¯¼æ "
format = "[$symbol]($style)"

[hostname]
ssh_only = true
ssh_symbol = "¯¼║ "
# ssh_symbol = "¾░úÇ "
format = "[$ssh_symbol$hostname ]($style)"

[localip]
disabled = false
# only shown with SSH

[directory]
truncation_symbol = "ÔÇª/"
home_symbol = "´Çò ~"
truncate_to_repo = false
truncation_length = 5
style = "bold blue"

[directory.substitutions]
"~/Projects/OpenUniversity/" = "´å£  "
"~/Projects/" = "¯»ƒ  "
"~/Work/" = "¯¬¼  "
"~/.dotfiles/" = "¯ù╝ "

[git_branch]
symbol = "¯®¿ "
format = "[on](text dimmed) [$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_commit]
format = "[on](text dimmed) [´Éù $hash$tag]($style) "
style = "bold purple"
tag_disabled = false
tag_symbol = " ´Ç½ "

[git_state]
style = "bold yellow"

[git_status]
style = "bold maroon"
format = "[$all_status$ahead_behind]($style)"
renamed = "¾░å¥ "
conflicted = "¾░×ç "
up_to_date = "´üå "
# untracked = "´ö® "
# untracked = "¯®┐ "
untracked = "¾▒äü "
modified = "´üä "
deleted = "´Çö "
stashed = "¾░Åù "
staged = "[++$count](green) "
diverged = "ÔçòÔçí($ahead_count)Ôçú($behind_count) "
ahead = "Ôçí$count "
behind = "Ôçú$count "

# === 1st Line: right hand side ===
[cmd_duration]
format = "[¯Öü $duration]($style)"
style = "flamingo"

[direnv]
disabled = false

[nodejs]
symbol = "¾░ÄÖ "
format = "[$symbol($version )]($style)"

[python]
symbol = "¾░îá "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
# it's possible to show pyenv version

[rust]
symbol = "¯×¿ "
format = "[$symbol($version )]($style)"

[docker_context]
symbol = "´îê "
format = "[$symbol$context]($style) "

[vagrant]
symbol = "Ôì▒ "
format = "[$symbol($version )]($style)"

[java]
symbol = "¯ëû "
style = "bold red"
format = "[${symbol}(${version} )]($style)"

[golang]
symbol = "¾░ƒô "
format = "[$symbol($version )]($style)"

[package]
symbol = "´Æç "
format = "[$symbol$version]($style) "

[aws]
symbol = "´â»  "
format = '[$symbol($profile )(\($region\) )(\[$duration\] )]($style)'
expiration_symbol = "¾▒ªƒ"
# expiration_symbol = "¾░öÜ"

[lua]
symbol = "¯ÿá "
format = "[$symbol($version )]($style)"

[ruby]
symbol = "¯ê× "
format = "[$symbol($version )]($style)"

[bun]
format = "[$symbol($version )]($style)"
symbol = "¯Ø» "
style = "bold rosewater"

[conda]
format = "[$symbol$environment]($style) "
# ignore_base = false

[container]
symbol = "´ÆÀ"

[haskell]
symbol = "¯ØÀ "
format = "[$symbol($version )]($style)"

[jobs]
symbol = "´Ææ"
# symbol = "´éà"
# symbol = "´éà"
# symbol = "´Çô"
# symbol = "Ô£ª"

[swift]
symbol = "¯ÜÖ "
format = "[$symbol($version )]($style)"

[terraform]
symbol = "¯ÜÜ "
format = "[$symbol$workspace]($style) "

[nix_shell]
symbol = "¾▒äà "
format = '[$symbol$state( \($name\))]($style) '
style = "bold sapphire"

[kubernetes]
disabled = false
symbol = "¯áØ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"

# De-emphasise OrbStack's built-in cluster (the default kube-context at ~/.kube/config)
[[kubernetes.contexts]]
context_pattern = "orbstack"
style = "dimmed blue"
context_alias = "orb"

[helm]
symbol = "¯ƒ╗ "
format = "[$symbol($version )]($style)"

