"$schema" = "https://starship.rs/config-schema.json"  # editor autocomplete
# NOTE: Unlike the Warp config, the right_format module was not used to
# produce the right prompt. This is because that module places elements
# on the same line as the input location. So fill is used instead.
# This has been avoided by Warp's default behaviour of creating a new line.

# === Prompt-wide configurations ===
palette = "catppuccin_mocha"
command_timeout = 1500  # Default timeout for commands is 500ms
add_newline = true  # A blank line before prompt start

format = """
$username\
$sudo\
$hostname\
$localip\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$fill\
$all$cmd_duration\
$line_break\
$character
"""

# === Misc. ===
[fill]
symbol = " "

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vimcmd_symbol = "[вқ®](bold green)"
vimcmd_replace_one_symbol = "[вқ®](bold purple)"
vimcmd_replace_symbol = "[вқ®](bold purple)"
vimcmd_visual_symbol = "[вқ®](bold yellow)"

# === 1st Line: left hand side ===
[username]
format = "[пҗ• $user]($style) "

[sudo]
disabled = false
style = "bold rosewater"
# symbol = '\[sudo\] '
symbol = "о¬‘ "
format = "[$symbol]($style)"

[hostname]
ssh_only = true
ssh_symbol = "о¬ә "
# ssh_symbol = "у°ЈҖ "
format = "[$ssh_symbol$hostname ]($style)"

[localip]
disabled = false
# only shown with SSH

[directory]
truncation_symbol = "вҖҰ/"
home_symbol = "пҖ• ~"
truncate_to_repo = false
truncation_length = 5
style = "bold blue"

[directory.substitutions]
"~/Projects/OpenUniversity/" = "пҶң  "
"~/Projects/" = "оҜҹ  "
"~/Work/" = "оӘ¬  "
"~/.dotfiles/" = "о—ј "

[git_branch]
symbol = "о©Ё "
format = "[on](text dimmed) [$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_commit]
format = "[on](text dimmed) [пҗ— $hash$tag]($style) "
style = "bold purple"
tag_disabled = false
tag_symbol = " пҖ« "

[git_state]
style = "bold yellow"

[git_status]
style = "bold maroon"
format = "[$all_status$ahead_behind]($style)"
renamed = "у°Ҷҫ "
conflicted = "у°һҮ "
up_to_date = "пҒҶ "
# untracked = "п”© "
# untracked = "о©ҝ "
untracked = "уұ„Ғ "
modified = "пҒ„ "
deleted = "пҖ” "
stashed = "у°Ҹ— "
staged = "[++$count](green) "
diverged = "вҮ•вҮЎ($ahead_count)вҮЈ($behind_count) "
ahead = "вҮЎ$count "
behind = "вҮЈ$count "

# === 1st Line: right hand side ===
[cmd_duration]
format = "[оҷҒ $duration]($style)"
style = "flamingo"

[direnv]
disabled = false

[nodejs]
symbol = "у°Һҷ "
format = "[$symbol($version )]($style)"

[python]
symbol = "у°Ң  "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
# it's possible to show pyenv version

[rust]
symbol = "оһЁ "
format = "[$symbol($version )]($style)"

[docker_context]
symbol = "пҢҲ "
format = "[$symbol$context]($style) "

[vagrant]
symbol = "вҚұ "
format = "[$symbol($version )]($style)"

[java]
symbol = "оү– "
style = "bold red"
format = "[${symbol}(${version} )]($style)"

[golang]
symbol = "у°ҹ“ "
format = "[$symbol($version )]($style)"

[package]
symbol = "п’Ү "
format = "[$symbol$version]($style) "

[aws]
disabled = true
symbol = "п’¬ "
format = "[$symbol($profile )(\\($region\\) )(\\[$duration\\] )]($style)"
expiration_symbol = "у°ғ°"

[lua]
symbol = "оҳ  "
format = "[$symbol($version )]($style)"

[ruby]
symbol = "оҲһ "
format = "[$symbol($version )]($style)"

[bun]
format = "[$symbol($version )]($style)"
symbol = "оқҜ "
style = "bold rosewater"

[conda]
format = "[$symbol$environment]($style) "
# ignore_base = false

[container]
symbol = "п’·"

[haskell]
symbol = "оқ· "
format = "[$symbol($version )]($style)"

[jobs]
symbol = "п’‘"
# symbol = "пӮ…"
# symbol = "пӮ…"
# symbol = "пҖ“"
# symbol = "вңҰ"

[swift]
symbol = "оҡҷ "
format = "[$symbol($version )]($style)"

[terraform]
symbol = "оҡҡ "
format = "[$symbol$workspace]($style) "

[nix_shell]
symbol = "уұ„… "
format = '[$symbol$state( \($name\))]($style) '
style = "bold sapphire"

[kubernetes]
disabled = false
symbol = "о қ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"

# De-emphasise OrbStack's built-in cluster (the default kube-context at ~/.kube/config)
[[kubernetes.contexts]]
context_pattern = "orbstack"
style = "dimmed blue"
context_alias = "orb"

[helm]
symbol = "оҹ» "
format = "[$symbol($version )]($style)"

