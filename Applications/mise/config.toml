[tools]
go = "latest"
air = "latest"
golangci-lint = "latest"
sqlc = "latest"
"aqua:pressly/goose" = "latest"
node = "lts"
pnpm = "latest"
bun = "latest"
python = "latest"
uv = "latest"
"pipx:ruff" = "latest"
"pipx:sqlfluff" = "latest"
# NOTE: The --with-executables-from flag (in `uv tool install`) will install those packages as
# dependencies (if they're not already so) AND include their executables
"pipx:ansible" = { version = "latest", uvx_args = "--with-executables-from ansible-core,ansible-lint"}
opentofu = "latest"
claude-code = "latest"
codex = "latest"

[settings]
color_theme = "catppuccin"
# On NixOS, mise auto-enables all_compile (it assumes precompiled binaries can't
# run) and would build runtimes from source, ignoring nix-ld (if present).
# We use nix-ld instead on NixOS so precompiled binaries run — faster, and the
# only option for binary-only tools (bun, aws, ...).
# Harmless on macOS, where precompiled is already the default.
# Docs: https://mise.jdx.dev/configuration/settings.html#all_compile
all_compile = false

[settings.npm]
package_manager = "bun"

[settings.pipx]
uvx = true
