schemaVersion = 1

[catalogs]
sortOrders = []

    [[catalogs.globalScopes]]
    catalogIdentifier = 'Tuna.EffectsCatalog'
    mode = 'none'
    selectedItemKeys = []

    [[catalogs.globalScopes]]
    catalogIdentifier = 'TunaEmoji.EmojiCatalog'
    mode = 'none'
    selectedItemKeys = []

[[comboMode.bindings]]
iconPath = '/Applications/Ghostty.app'
key = 'g'
label = 'Terminal'
url = 'tuna://run/Tuna.Internal.RecentObjectsCatalog.Ghostty/Open'

[[comboMode.bindings]]
iconPath = 'window.horizontal'
key = 'w'
label = 'Window'

    [[comboMode.bindings.children]]
    key = 'f'
    label = 'Fill'
    url = 'tuna://run/text.shortcuts%2520run%2520%2522Window%2520Fill%2522/Run%20Text%20as%20Shell%20Command'

[[comboMode.bindings]]
iconPath = '/Applications/Visual Studio Code.app'
key = 'v'
label = 'Editor'
url = 'tuna://run/TunaCore.ApplicationsCatalog.Visual%20Studio%20Code/Open'

[[comboMode.bindings]]
iconPath = '/Applications/Brave Browser.app'
key = 'b'
label = 'Browser'
url = 'tuna://run/TunaCore.ApplicationsCatalog.Brave%20Browser/Open'

[[comboMode.bindings]]
iconPath = '/Applications/Obsidian.app'
key = 'o'
label = 'Obsidian'
url = 'tuna://run/TunaCore.ApplicationsCatalog.Obsidian/Open'

[[comboMode.bindings]]
iconPath = '/System/Library/CoreServices/Finder.app'
key = 'f'
label = 'Finder'
url = 'tuna://run/TunaCore.ApplicationsCatalog.Finder/Open'

[[comboMode.bindings]]
iconPath = '/Users/murtadha/Applications/YT Music.app'
key = 'm'
label = 'Music'
url = 'tuna://run/TunaCore.ApplicationsCatalog.YT%20Music/Open'

[[comboMode.bindings]]
iconPath = '/Applications/Google Chrome.app'
key = 'c'
url = 'tuna://run/TunaCore.ApplicationsCatalog.Google%20Chrome/TunaCore.CommonActionsCatalog.Open'

[hotkeys]
custom = []

    [hotkeys.app.comboMode]
    carbonKeyCode = 49
    carbonModifiers = 2048

[settings]
appPresentationMode = 'never'
comboModeCheatsheetBehavior = 'always'
comboModeThemeStyle = 'cheatsheet'
comboModeTriggerType = 'disabled'
fuzzyModeTriggerType = 'disabled'
resultListNavigationBindings = 'macOSStandard'
themeIdentifier = 'com.brnbw.tuna.themes.default'
typingTimeoutDuration = 2.0